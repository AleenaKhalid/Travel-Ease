name: CI for Release Branch

on:
  pull_request:
    branches: [ release ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run HTMLHint
      run: npx htmlhint "**/*.html"

    - name: Run Stylelint
      run: npx stylelint "**/*.css"
