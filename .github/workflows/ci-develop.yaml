name: pr-validation

on:
  pull_request:
    branches: 
      - develop
    types: 
      - opened
      - synchronize

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository On the Runner 
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install linters
        run: npm install --save-dev stylelint stylelint-config-standard


      - name: Lint HTML Files with HTMLHint
        run: htmlhint "**/*.html"

      - name: Lint CSS Files with Stylelint
        run: stylelint "**/*.css"

  build:
    runs-on: ubuntu-latest
    needs: linting
    steps:
      - name: Checkout Repository On the Runner 
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: '18' 

      - name: Install Parcel
        run: npm install -g parcel

      - name: Build Website with Parcel
        run: parcel build "./src/index.html" --dist-dir "./dist"

